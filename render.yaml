services:
  - type: web
    name: terra-web
    runtime: docker
    plan: free
    dockerfilePath: ./backend/dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: terra-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini

databases:
  - name: terra-db
    plan: free
    databaseName: terra
    user: terra
